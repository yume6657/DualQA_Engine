<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DualQA Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #212121;
  --sidebar-bg: #171717;
  --border: #2f2f2f;
  --text: #ececec;
  --text-2: #b4b4b4;
  --text-3: #6b6b6b;
  --accent: #10a37f;
  --accent-hover: #0d8f6f;
  --accent-light: rgba(16,163,127,0.12);
  --user-bubble: #2f2f2f;
  --ai-bg: transparent;
  --input-bg: #2f2f2f;
  --input-border: #3f3f3f;
  --hover: rgba(255,255,255,0.05);
  --red: #ef4444;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden; font-size: 15px;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; background: none; }
input { font-family: inherit; outline: none; border: none; background: none; color: var(--text); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Auth ── */
#authSection {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.auth-card {
  width: 100%; max-width: 360px;
  animation: fadeUp 0.4s ease;
}
.auth-logo {
  font-size: 24px; font-weight: 700; text-align: center;
  margin-bottom: 6px; color: var(--text);
}
.auth-tagline {
  font-size: 13px; color: var(--text-3); text-align: center; margin-bottom: 32px;
}
.auth-card h3 {
  font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: center;
}
.field { margin-bottom: 12px; }
.field label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-2); margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 11px 14px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 10px; font-size: 14px; color: var(--text);
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-3); }

.btn-primary {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border-radius: 10px; font-size: 14px; font-weight: 600;
  transition: background 0.2s, transform 0.1s;
  margin-top: 6px;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.99); }
.btn-register { background: #3b3b3b; color: var(--text); }
.btn-register:hover { background: #4a4a4a; }
.btn-link {
  width: 100%; padding: 10px; color: var(--text-3);
  font-size: 13px; margin-top: 6px; transition: color 0.2s;
}
.btn-link:hover { color: var(--text-2); }
#authTip { min-height: 20px; font-size: 12px; margin-top: 10px; text-align: center; }

/* ── App ── */
#appContainer {
  display: none; height: 100vh;
  flex-direction: row;
}
.sidebar-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40;
}
.sidebar-backdrop.show { opacity: 1; pointer-events: auto; }

/* ── Sidebar ── */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  height: 100vh; border-right: 1px solid var(--border);
}
.sidebar-header { padding: 16px 12px 8px; }
.sidebar-brand {
  font-size: 14px; font-weight: 600; color: var(--text);
  padding: 8px 10px; margin-bottom: 4px;
}

.new-chat-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 12px;
  border-radius: 8px; font-size: 14px; color: var(--text-2);
  transition: background 0.15s, color 0.15s;
}
.new-chat-btn:hover { background: var(--hover); color: var(--text); }
.new-chat-btn svg { flex-shrink: 0; opacity: 0.7; }

.history-label {
  padding: 12px 14px 6px;
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.history-list { flex: 1; overflow-y: auto; padding: 2px 8px; }
.history-empty {
  padding: 16px 10px; font-size: 12px; color: var(--text-3); text-align: center;
}
.history-item-container {
  display: flex; align-items: center;
  border-radius: 8px; transition: background 0.15s;
  padding: 2px 4px;
}
.history-item-container:hover { background: var(--hover); }
.history-item-container.active { background: rgba(255,255,255,0.08); }
.history-item {
  flex: 1; padding: 8px 8px; font-size: 13px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  border-radius: 6px;
}
.history-item-container.active .history-item { color: var(--text); }
.delete-btn {
  width: 26px; height: 26px; flex-shrink: 0;
  color: var(--text-3); border-radius: 6px; font-size: 11px;
  opacity: 0; transition: opacity 0.15s, background 0.15s;
}
.history-item-container:hover .delete-btn,
.history-item-container.active .delete-btn { opacity: 1; }
.delete-btn:hover { background: rgba(239,68,68,0.15); color: var(--red); }

.user-profile {
  padding: 10px 12px 14px;
  border-top: 1px solid var(--border);
}
.user-badge {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border-radius: 8px;
  transition: background 0.15s; margin-bottom: 6px;
}
.user-badge:hover { background: var(--hover); }
.user-avatar {
  width: 32px; height: 32px;
  background: var(--accent); color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.user-meta strong { display: block; font-size: 13px; font-weight: 500; }
.user-meta span { font-size: 11px; color: var(--text-3); }
.logout-btn {
  width: 100%; padding: 9px 10px; text-align: left;
  color: var(--text-3); font-size: 13px; border-radius: 8px;
  transition: background 0.15s, color 0.15s;
}
.logout-btn:hover { background: rgba(239,68,68,0.1); color: var(--red); }

/* ── Main ── */
.main-content {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  background: var(--bg); height: 100vh;
}

.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}
.chat-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.mobile-menu-btn {
  display: none; width: 34px; height: 34px;
  border-radius: 8px; color: var(--text-2);
  align-items: center; justify-content: center;
  transition: background 0.15s;
}
.mobile-menu-btn:hover { background: var(--hover); }
.chat-title { font-size: 14px; font-weight: 500; color: var(--text-2); }

/* ── KB Control ── */
.kb-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.kb-status {
  font-size: 12px; color: var(--text-3);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 5px 10px; background: var(--input-bg);
  border-radius: 20px; border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.kb-status.active { color: var(--accent); border-color: rgba(16,163,127,0.3); }
.kb-status.clickable { cursor: pointer; }
.kb-status.clickable:hover { border-color: var(--accent); }
.kb-upload-label {
  display: inline-flex; align-items: center;
  padding: 6px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 12px; font-weight: 500;
  color: var(--text-2); cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.kb-upload-label:hover { border-color: var(--text-3); color: var(--text); background: var(--hover); }
.kb-confirm-btn {
  padding: 6px 14px; background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 12px; font-weight: 600;
  transition: background 0.2s;
}
.kb-confirm-btn:hover { background: var(--accent-hover); }
.kb-confirm-btn:disabled { background: var(--border); color: var(--text-3); cursor: not-allowed; }

/* ── Chat Box ── */
.chat-box {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  scroll-behavior: smooth;
}
.chat-box.welcome-mode {
  justify-content: center; align-items: center;
  overflow: hidden; padding: 24px;
}
.chat-box.chat-mode { padding: 0; }

/* ── Welcome ── */
.welcome-wrap {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; max-width: 680px;
  animation: fadeUp 0.4s ease;
}
.welcome-greeting {
  font-size: 32px; font-weight: 700; text-align: center;
  margin-bottom: 10px; color: var(--text);
  letter-spacing: -0.02em;
}
.welcome-sub {
  font-size: 15px; color: var(--text-3); text-align: center;
  margin-bottom: 32px;
}
.welcome-input-area { width: 100%; }

/* ── Messages ── */
.messages-area {
  flex: 1; overflow-y: auto;
  padding: 24px 0 8px;
  display: flex; flex-direction: column; gap: 0;
}
.message-row {
  display: flex; padding: 16px 24px;
  gap: 16px; width: 100%;
  animation: fadeUp 0.2s ease;
  transition: background 0.15s;
}
.message-row:hover { background: rgba(255,255,255,0.02); }
.message-row.user { flex-direction: row-reverse; justify-content: flex-start; }
.message-row.ai { justify-content: flex-start; }

.ai-avatar, .user-avatar-bubble {
  width: 32px; height: 32px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 2px;
}
.ai-avatar { background: var(--accent); color: #fff; }
.user-avatar-bubble { background: #5c5c5c; color: #fff; }

.message-content { min-width: 0; max-width: 70%; }

.message {
  display: inline-block;
  padding: 12px 16px; border-radius: 18px;
  font-size: 15px; line-height: 1.7;
  word-break: break-word; white-space: pre-wrap;
  text-align: left;
}
.user-msg {
  background: var(--user-bubble); color: var(--text);
  border-bottom-right-radius: 4px;
}
.ai-msg {
  background: transparent; color: var(--text);
  padding: 4px 0;
}
.message-meta {
  font-size: 11px; color: var(--text-3); margin-top: 6px;
}

/* ── Input ── */
.input-wrapper {
  padding: 12px 24px 20px; flex-shrink: 0;
}
.loading { display: none; margin-bottom: 10px; padding: 0 4px; }
.loading-inner {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-3);
}
.loading-dots span {
  display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--accent);
  animation: dot 1.4s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%,80%,100% { transform: scale(0.5); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.input-container {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 12px 14px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 760px; margin: 0 auto;
}
.input-container:focus-within {
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}
.input-container input {
  flex: 1; font-size: 15px; padding: 2px 4px;
  color: var(--text); background: none;
}
.input-container input::placeholder { color: var(--text-3); }

.send-btn {
  width: 34px; height: 34px; flex-shrink: 0;
  background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s, opacity 0.2s;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: var(--border); opacity: 0.5; cursor: not-allowed; transform: none; }

.input-footer {
  text-align: center; font-size: 11px; color: var(--text-3);
  margin-top: 8px; max-width: 760px; margin: 8px auto 0;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  padding: 10px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  background: #3a3a3a; color: var(--text);
  box-shadow: var(--shadow);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: rgba(16,163,127,0.9); }
.toast.error { background: rgba(239,68,68,0.9); }

/* ── KB Modal ── */
.kb-modal-backdrop {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; padding: 24px;
  backdrop-filter: blur(4px);
}
.kb-modal-backdrop.show { display: flex; }
.kb-modal {
  width: 100%; max-width: 680px; max-height: 80vh;
  display: flex; flex-direction: column;
  background: #2a2a2a; border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  animation: fadeUp 0.25s ease;
}
.kb-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.kb-modal-title { font-size: 15px; font-weight: 600; }
.kb-modal-close {
  width: 28px; height: 28px; border-radius: 6px;
  color: var(--text-3); font-size: 13px;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.kb-modal-close:hover { background: rgba(239,68,68,0.15); color: var(--red); }
.kb-modal-meta {
  padding: 8px 20px; font-size: 12px; color: var(--text-3);
  background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
}
.kb-modal-body {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  font-size: 13px; line-height: 1.8; color: var(--text-2);
  white-space: pre-wrap; word-break: break-word;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
    transform: translateX(-100%); transition: transform 0.25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-menu-btn { display: inline-flex; }
  .kb-status { display: none; }
  .chat-header { padding: 10px 14px; }
  .input-wrapper { padding: 10px 14px 16px; }
  .message-row { padding: 12px 14px; }
  .welcome-greeting { font-size: 24px; }
}
</style>
</head>
<body>

<!-- ── Auth ── -->
<div id="authSection">
  <div class="auth-card">
    <div class="auth-logo">DualQA Engine</div>
    <div class="auth-tagline">双语智能问答系统</div>
    <h3 id="authTitle">登录</h3>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div id="authRegisterField" class="field" style="display:none">
      <label>确认密码</label>
      <input type="password" id="authConfirm" placeholder="再次输入密码">
    </div>
    <div id="authTip"></div>
    <button class="btn-primary" id="authSubmitBtn" onclick="handleAuth()">登录</button>
    <button class="btn-link" id="authToggleBtn" onclick="toggleAuthMode()">没有账号？立即注册</button>
  </div>
</div>

<!-- ── App ── -->
<div id="appContainer">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">DualQA Engine</div>
      <button class="new-chat-btn" onclick="startNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
    </div>
    <div class="history-label">历史对话</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无历史对话</div>
    </div>
    <div class="user-profile">
      <div class="user-badge" onclick="openProfileModal()" style="cursor:pointer">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-meta">
          <strong id="userNameDisplay">用户</strong>
          <span>已登录</span>
        </div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">退出登录</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="mobile-menu-btn" onclick="openSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="chat-title" id="chatTitle">新对话</span>
      </div>
      <div class="kb-control">
        <div class="kb-status" id="kbStatus" onclick="handleKbStatusClick()">未上传知识库</div>
        <input type="file" id="kbFileInput" accept=".txt,.pdf" style="display:none" onchange="onKbFileSelected()">
        <label class="kb-upload-label" for="kbFileInput" id="kbUploadLabel">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          上传知识库
        </label>
        <button class="kb-confirm-btn" id="kbConfirmBtn" style="display:none" onclick="uploadKnowledgeBase()">确认上传</button>
      </div>
    </div>

    <div class="chat-box welcome-mode" id="chatBox">
      <!-- Welcome or messages rendered here -->
    </div>

    <div class="input-wrapper" id="inputWrapperBottom">
      <div class="loading" id="loadingIndicator">
        <div class="loading-inner">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          AI 正在思考...
        </div>
      </div>
      <div class="input-container">
        <input type="text" id="userInput" placeholder="输入消息，按 Enter 发送..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-footer">DualQA Engine · 双语智能问答</div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="kb-modal-backdrop" id="profileModalBackdrop" onclick="if(event.target===this)closeProfileModal()">
  <div class="kb-modal" style="max-width:420px">
    <div class="kb-modal-header">
      <span class="kb-modal-title">个人资料</span>
      <button class="kb-modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="kb-modal-body" style="padding:24px 24px 20px">
      <div style="text-align:center;margin-bottom:20px">
        <div id="profileAvatarPreview" style="width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;overflow:hidden;cursor:pointer" onclick="document.getElementById('avatarFileInput').click()"></div>
        <input type="file" id="avatarFileInput" accept=".jpg,.jpeg,.png,.gif,.webp" style="display:none" onchange="uploadAvatar()">
        <div style="font-size:12px;color:var(--text-3)">点击头像更换图片</div>
      </div>
      <div class="field">
        <label>昵称</label>
        <input type="text" id="profileNickname" placeholder="输入昵称">
      </div>
      <div style="border-top:1px solid var(--border);margin:16px 0 14px"></div>
      <div style="font-size:12px;font-weight:600;color:var(--text-3);margin-bottom:12px">修改密码（不修改请留空）</div>
      <div class="field">
        <label>旧密码</label>
        <input type="password" id="profileOldPwd" placeholder="输入旧密码">
      </div>
      <div class="field">
        <label>新密码</label>
        <input type="password" id="profileNewPwd" placeholder="输入新密码">
      </div>
      <div id="profileTip" style="min-height:18px;font-size:12px;text-align:center;margin-bottom:8px"></div>
      <button class="btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<script>
const API = '/api/chat';
let currentConvId = null;
let isLoading = false;
let selectedKbFile = null;
let isRegisterMode = false;

// ── Auth ──
function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authTitle').textContent = isRegisterMode ? '注册' : '登录';
  document.getElementById('authSubmitBtn').textContent = isRegisterMode ? '注册' : '登录';
  document.getElementById('authToggleBtn').textContent = isRegisterMode ? '已有账号？立即登录' : '没有账号？立即注册';
  document.getElementById('authRegisterField').style.display = isRegisterMode ? '' : 'none';
  document.getElementById('authTip').textContent = '';
}

async function handleAuth() {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;
  const tip = document.getElementById('authTip');
  if (!username || !password) { tip.style.color = 'var(--red)'; tip.textContent = '请填写用户名和密码'; return; }

  if (isRegisterMode) {
    const confirm = document.getElementById('authConfirm').value;
    if (password !== confirm) { tip.style.color = 'var(--red)'; tip.textContent = '两次密码不一致'; return; }
    const res = await fetch(`${API}/register/`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (res.ok) { tip.style.color = 'var(--accent)'; tip.textContent = '注册成功，请登录'; toggleAuthMode(); }
    else { tip.style.color = 'var(--red)'; tip.textContent = data.username?.[0] || '注册失败'; }
  } else {
    const res = await fetch(`${API}/login/`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('access_token', data.access);
      localStorage.setItem('username', username);
      initApp();
    } else { tip.style.color = 'var(--red)'; tip.textContent = '用户名或密码错误'; }
  }
}

function authHeaders() {
  return { 'Authorization': `Bearer ${localStorage.getItem('access_token')}`, 'Content-Type': 'application/json' };
}

// ── Init ──
function initApp() {
  const token = localStorage.getItem('access_token');
  if (!token) return;
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('appContainer').style.display = 'flex';
  const username = localStorage.getItem('username') || '用户';
  document.getElementById('userNameDisplay').textContent = username;
  document.getElementById('userAvatar').textContent = username[0].toUpperCase();
  fetchHistoryList();
  fetchCurrentKb();
  renderWelcome();
}

// ── Sidebar ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}

// ── History ──
async function fetchHistoryList() {
  const res = await fetch(`${API}/history/`, { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  const list = document.getElementById('historyList');
  if (!data.length) { list.innerHTML = '<div class="history-empty">暂无历史对话</div>'; return; }
  list.innerHTML = data.map(c => `
    <div class="history-item-container${c.id===currentConvId?' active':''}" id="hitem-${c.id}">
      <div class="history-item" onclick="loadConversation(${c.id})">${c.title}</div>
      <button class="delete-btn" onclick="deleteConversation(${c.id},event)" title="删除">✕</button>
    </div>`).join('');
}

async function loadConversation(id) {
  currentConvId = id;
  closeSidebar();
  document.querySelectorAll('.history-item-container').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`hitem-${id}`);
  if (el) el.classList.add('active');
  const res = await fetch(`${API}/history/${id}/`, { headers: authHeaders() });
  if (!res.ok) return;
  const msgs = await res.json();
  switchToChatMode();
  const area = document.getElementById('messagesArea');
  area.innerHTML = '';
  msgs.forEach(m => appendMessage(m.role, m.content, false));
  area.scrollTop = area.scrollHeight;
  document.getElementById('chatTitle').textContent = msgs[0]?.content?.slice(0,20) || '对话';
}

async function deleteConversation(id, e) {
  e.stopPropagation();
  const res = await fetch(`${API}/history/${id}/delete/`, { method: 'DELETE', headers: authHeaders() });
  if (res.ok) {
    if (currentConvId === id) startNewChat();
    fetchHistoryList();
    showToast('已删除', 'success');
  }
}

// ── Chat ──
function renderWelcome() {
  const box = document.getElementById('chatBox');
  box.className = 'chat-box welcome-mode';
  const username = localStorage.getItem('username') || '用户';
  box.innerHTML = `
    <div class="welcome-wrap">
      <div class="welcome-greeting">你好，${username}！</div>
      <div class="welcome-sub">我是 DualQA Engine，你的双语智能问答助手。有什么可以帮你？</div>
      <div class="welcome-input-area">
        <div class="input-container">
          <input type="text" id="userInput" placeholder="输入消息，按 Enter 发送..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  document.getElementById('inputWrapperBottom').style.display = 'none';
}

function switchToChatMode() {
  const box = document.getElementById('chatBox');
  if (box.classList.contains('chat-mode')) return;
  box.className = 'chat-box chat-mode';
  box.innerHTML = '<div class="messages-area" id="messagesArea"></div>';
  document.getElementById('inputWrapperBottom').style.display = '';
  setTimeout(() => document.getElementById('userInput')?.focus(), 50);
}

function appendMessage(role, content, scroll=true) {
  switchToChatMode();
  const area = document.getElementById('messagesArea');
  const isUser = role === 'user';
  const initials = isUser ? (localStorage.getItem('username')||'U')[0].toUpperCase() : 'AI';
  const div = document.createElement('div');
  div.className = `message-row ${isUser ? 'user' : 'ai'}`;
  div.innerHTML = `
    <div class="${isUser?'user-avatar-bubble':'ai-avatar'}">${initials}</div>
    <div class="message-content">
      <div class="message ${isUser?'user-msg':'ai-msg'}">${escHtml(content)}</div>
    </div>`;
  area.appendChild(div);
  if (scroll) area.scrollTop = area.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  appendMessage('user', content);
  setLoading(true);
  try {
    const res = await fetch(`${API}/ask/`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ content, conversation_id: currentConvId })
    });
    const data = await res.json();
    if (res.ok) {
      currentConvId = data.conversation_id;
      appendMessage('assistant', data.ai_message.content);
      fetchHistoryList();
      document.getElementById('chatTitle').textContent = content.slice(0,20);
    } else {
      appendMessage('assistant', data.error || '请求失败');
    }
  } catch(e) {
    appendMessage('assistant', '网络错误，请重试');
  }
  setLoading(false);
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('loadingIndicator').style.display = v ? 'block' : 'none';
  document.getElementById('sendBtn').disabled = v;
}

function startNewChat() {
  currentConvId = null;
  renderWelcome();
  document.getElementById('chatTitle').textContent = '新对话';
  document.querySelectorAll('.history-item-container').forEach(el => el.classList.remove('active'));
  closeSidebar();
}

// ── Knowledge Base ──
async function fetchCurrentKb() {
  const res = await fetch(`${API}/knowledge-base/current/`, { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  const el = document.getElementById('kbStatus');
  if (data.active) {
    el.textContent = `📄 ${data.name}`;
    el.classList.add('active', 'clickable');
  } else {
    el.textContent = '未上传知识库';
    el.classList.remove('active', 'clickable');
  }
}

function handleKbStatusClick() {
  const el = document.getElementById('kbStatus');
  if (el.classList.contains('clickable')) viewKbContent();
}

function onKbFileSelected() {
  const file = document.getElementById('kbFileInput').files[0];
  if (!file) return;
  selectedKbFile = file;
  document.getElementById('kbStatus').textContent = `已选: ${file.name}`;
  document.getElementById('kbStatus').classList.remove('active', 'clickable');
  document.getElementById('kbConfirmBtn').style.display = '';
}

async function uploadKnowledgeBase() {
  if (!selectedKbFile) return;
  const btn = document.getElementById('kbConfirmBtn');
  const label = document.getElementById('kbUploadLabel');
  btn.disabled = true; btn.textContent = '上传中...';
  label.style.pointerEvents = 'none';
  const form = new FormData();
  form.append('file', selectedKbFile);
  try {
    const res = await fetch(`${API}/knowledge-base/upload/`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` },
      body: form
    });
    const data = await res.json();
    if (res.ok) {
      showToast(`知识库已上传（${data.chunk_count} 个片段）`, 'success');
      selectedKbFile = null;
      document.getElementById('kbFileInput').value = '';
      btn.style.display = 'none';
      fetchCurrentKb();
      startNewChat();
    } else {
      showToast(data.error || '上传失败', 'error');
    }
  } catch(e) {
    showToast('网络错误', 'error');
  }
  btn.disabled = false; btn.textContent = '确认上传';
  label.style.pointerEvents = '';
}

async function viewKbContent() {
  document.getElementById('kbModalBackdrop').classList.add('show');
  document.getElementById('kbModalBody').textContent = '加载中...';
  const res = await fetch(`${API}/knowledge-base/content/`, { headers: authHeaders() });
  const data = await res.json();
  if (res.ok) {
    document.getElementById('kbModalTitle').textContent = data.name;
    document.getElementById('kbModalMeta').textContent = `类型: ${data.file_type} · 片段数: ${data.chunk_count}`;
    document.getElementById('kbModalBody').textContent = data.content;
  } else {
    document.getElementById('kbModalBody').textContent = data.error || '加载失败';
  }
}

function closeKbModal() {
  document.getElementById('kbModalBackdrop').classList.remove('show');
}

// ── Toast ──
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${type?' '+type:''} show`;
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Logout ──
function handleLogout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('username');
  closeSidebar();
  location.reload();
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('authPassword')) handleAuth();
  if (e.key === 'Enter' && document.activeElement === document.getElementById('authUsername')) document.getElementById('authPassword').focus();
});

// ── Profile ──
async function openProfileModal() {
  document.getElementById('profileModalBackdrop').classList.add('show');
  document.getElementById('profileTip').textContent = '';
  const res = await fetch(`${API}/profile/`, { headers: authHeaders() });
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('profileNickname').value = data.nickname || '';
  const preview = document.getElementById('profileAvatarPreview');
  if (data.avatar) {
    preview.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    preview.textContent = (data.nickname || data.username || 'U')[0].toUpperCase();
  }
}

function closeProfileModal() {
  document.getElementById('profileModalBackdrop').classList.remove('show');
  document.getElementById('profileOldPwd').value = '';
  document.getElementById('profileNewPwd').value = '';
}

async function saveProfile() {
  const tip = document.getElementById('profileTip');
  const nickname = document.getElementById('profileNickname').value.trim();
  const old_password = document.getElementById('profileOldPwd').value;
  const new_password = document.getElementById('profileNewPwd').value;
  tip.textContent = '';
  const res = await fetch(`${API}/profile/`, {
    method: 'PUT',
    headers: authHeaders(),
    body: JSON.stringify({ nickname, old_password, new_password })
  });
  const data = await res.json();
  if (res.ok) {
    tip.style.color = 'var(--accent)'; tip.textContent = '保存成功';
    if (nickname) {
      localStorage.setItem('username', nickname);
      document.getElementById('userNameDisplay').textContent = nickname;
      document.getElementById('userAvatar').textContent = nickname[0].toUpperCase();
    }
    if (new_password) setTimeout(closeProfileModal, 800);
  } else {
    tip.style.color = 'var(--red)'; tip.textContent = data.error || '保存失败';
  }
}

async function uploadAvatar() {
  const file = document.getElementById('avatarFileInput').files[0];
  if (!file) return;
  const form = new FormData();
  form.append('avatar', file);
  const res = await fetch(`${API}/profile/avatar/`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` },
    body: form
  });
  const data = await res.json();
  if (res.ok) {
    const preview = document.getElementById('profileAvatarPreview');
    preview.innerHTML = `<img src="${data.avatar}?t=${Date.now()}" style="width:100%;height:100%;object-fit:cover">`;
    showToast('头像已更新', 'success');
  } else {
    showToast(data.error || '上传失败', 'error');
  }
}

// ── Boot ──
initApp();
</script>
</body>
</html>
