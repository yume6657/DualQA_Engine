version: '3.8'

services:
  web:
    build: .
    container_name: dualqa_engine
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
      - ./knowledge_base:/app/knowledge_base
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
